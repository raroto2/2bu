<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주요관리지표 - 자동차영업본부 실적 및 효율 관리</title>
    <!-- Tailwind CSS for modern responsive styles -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for professional business icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts for crisp readability -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
        }
        /* Custom styled smooth input to act like an Excel cell */
        .cell-input {
            transition: all 0.15s ease-in-out;
        }
        .cell-input:focus {
            background-color: #f0fdf4 !important; /* light green highlight on focus */
            outline: 2px solid #22c55e;
        }
        /* Custom scrollbar for horizontal spreadsheet layout */
        .custom-scrollbar::-webkit-scrollbar {
            height: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* Hide default spin buttons in number inputs for mobile cleanliness */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col">

    <!-- Header with application identity -->
    <header class="bg-gradient-to-r from-slate-900 via-indigo-950 to-slate-900 text-white shadow-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Brand logo and status -->
                <div class="flex items-center space-x-3">
                    <div class="bg-indigo-600 text-white p-2 rounded-xl shadow-md">
                        <i class="fa-solid fa-table text-lg"></i>
                    </div>
                    <div>
                        <h1 class="text-md sm:text-lg font-black tracking-tight flex items-center gap-2">
                            주요관리지표 <span class="bg-emerald-400 text-slate-950 text-[10px] px-2 py-0.5 rounded-full font-bold">자동차영업부</span>
                        </h1>
                    </div>
                </div>

                <!-- Year Controller -->
                <div class="flex items-center">
                    <div class="flex items-center bg-white/10 rounded-xl p-1 border border-white/10">
                        <button onclick="adjustYear(-1)" class="px-2.5 py-1 text-slate-300 hover:text-white transition"><i class="fa-solid fa-chevron-left text-xs"></i></button>
                        <span id="displayYear" class="px-3 font-extrabold text-sm tracking-wider text-emerald-400">2026년</span>
                        <button onclick="adjustYear(1)" class="px-2.5 py-1 text-slate-300 hover:text-white transition"><i class="fa-solid fa-chevron-right text-xs"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Screen/Tab navigation: 3 Main views requested by the user -->
    <nav class="bg-white border-b border-slate-200 sticky top-16 z-30 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex space-x-2 py-3 overflow-x-auto">
                <button onclick="switchScreen('revenue')" id="btnScreenRevenue" class="px-5 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 flex items-center gap-2 bg-indigo-600 text-white shadow-md shadow-indigo-100 whitespace-nowrap">
                    <i class="fa-solid fa-wallet text-sm"></i>
                    <span>화면 1: 매출/인원현황</span>
                </button>
                <button onclick="switchScreen('efficiency1')" id="btnScreenEff1" class="px-5 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 flex items-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200 whitespace-nowrap">
                    <i class="fa-solid fa-percent text-sm"></i>
                    <span>화면 2: 갱신율/불량율</span>
                </button>
                <button onclick="switchScreen('efficiency2')" id="btnScreenEff2" class="px-5 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 flex items-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200 whitespace-nowrap">
                    <i class="fa-solid fa-triangle-exclamation text-sm"></i>
                    <span>화면 3: 기타효율등</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 flex-1 w-full space-y-6">

        <!-- Spreadsheet Grid Container -->
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
            <!-- Table Header Bar controls with Add button, Search and Export -->
            <div class="px-5 py-4 border-b border-slate-100 flex flex-col md:flex-row md:items-center md:justify-between gap-4 bg-slate-50/50">
                <div>
                    <h3 class="text-slate-900 font-bold text-sm flex items-center gap-1.5">
                        <i class="fa-solid fa-list-check text-indigo-600"></i>
                        <span id="spreadsheetTitle">매출/인원현황 분석판</span>
                    </h3>
                </div>
                <!-- Control Area (Search, Add Row, Export) -->
                <div class="flex flex-wrap items-center gap-2">
                    <div class="relative">
                        <input type="text" id="gridSearch" oninput="filterGridData()" placeholder="센터명/영업책임자 검색..." class="w-40 pl-8 pr-3 py-2 bg-white border border-slate-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                        <i class="fa-solid fa-magnifying-glass absolute left-2.5 top-3 text-slate-400 text-[10px]"></i>
                    </div>
                    <button onclick="openAddRowModal()" class="bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-sm transition-all flex items-center gap-1.5 whitespace-nowrap">
                        <i class="fa-solid fa-plus"></i> 줄 추가
                    </button>
                    <button onclick="exportCurrentScreenToCSV()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-2 rounded-xl text-xs font-bold transition flex items-center gap-1 whitespace-nowrap">
                        <i class="fa-solid fa-file-csv"></i> 내보내기
                    </button>
                </div>
            </div>

            <!-- Spreadsheet Grid (Horizontal Scroll enabled for extensive timelines) -->
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left text-xs border-collapse min-w-[1100px]">
                    <thead>
                        <tr class="bg-slate-100 border-b border-slate-200 text-slate-500 font-bold text-[10px]">
                            <!-- Left Columns - Sticky First Column and Fluid Headers -->
                            <th class="py-2 px-2 text-slate-700 font-bold border-r border-slate-200 bg-slate-100 whitespace-nowrap sticky left-0 z-20 shadow-[1px_0_0_0_rgba(226,232,240,1)]">구분</th>
                            <th class="py-2 px-2 text-slate-700 font-bold border-r border-slate-200 bg-slate-100 whitespace-nowrap">센터명</th>
                            <th class="py-2 px-2 text-slate-700 font-bold border-r border-slate-200 bg-slate-100 whitespace-nowrap">영업책임자</th>
                            
                            <!-- Chronological Time-series Monthly Headers -->
                            <th class="py-2 px-0.5 text-center border-r border-slate-200 w-[54px]">1월</th>
                            <th class="py-2 px-0.5 text-center border-r border-slate-200 w-[54px]">2월</th>
                            <th class="py-2 px-0.5 text-center border-r border-slate-200 w-[54px]">3월</th>
                            <th class="py-2 px-0.5 text-center border-r border-slate-200 w-[54px]">4월</th>
                            <th class="py-2 px-0.5 text-center border-r border-slate-200 w-[54px]">5월</th>
                            <th class="py-2 px-0.5 text-center border-r border-slate-200 w-[54px]">6월</th>
                            <th class="py-2 px-0.5 text-center border-r border-slate-200 w-[54px]">7월</th>
                            <th class="py-2 px-0.5 text-center border-r border-slate-200 w-[54px]">8월</th>
                            <th class="py-2 px-0.5 text-center border-r border-slate-200 w-[54px]">9월</th>
                            <th class="py-2 px-0.5 text-center border-r border-slate-200 w-[54px]">10월</th>
                            <th class="py-2 px-0.5 text-center border-r border-slate-200 w-[54px]">11월</th>
                            <th class="py-2 px-0.5 text-center border-r border-slate-200 w-[54px]">12월</th>
                            
                            <!-- Manual Year Cumulative and Year Average Columns -->
                            <th class="py-2 px-1 text-center border-r border-slate-200 bg-indigo-50/50 text-indigo-950 w-[65px]">년 누적</th>
                            <th class="py-2 px-1 text-center border-r border-slate-200 bg-indigo-50/50 text-indigo-950 w-[65px]">년 평균</th>
                            
                            <th class="py-2 px-2 text-center w-[110px] whitespace-nowrap">줄 관리</th>
                        </tr>
                    </thead>
                    <tbody id="spreadsheetBody" class="divide-y divide-slate-100">
                        <!-- Javascript will dynamically inject rows here -->
                    </tbody>
                </table>
            </div>

            <!-- Empty State Helper -->
            <div id="gridNoData" class="hidden py-16 text-center text-slate-400">
                <i class="fa-solid fa-ban text-4xl text-slate-300 mb-2"></i>
                <p class="text-sm font-bold">등록된 영업 부서 데이터가 전혀 없습니다.</p>
                <p class="text-xs text-slate-400 mt-1">[줄 추가] 단추를 눌러 첫 정보를 입력해 주십시오.</p>
            </div>
        </div>

    </main>

    <!-- Row Metadata Form Modal (For Adding or Editing Left Side of Grid) -->
    <div id="rowMetaModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl w-full max-w-md mx-4 shadow-2xl border border-slate-100 overflow-hidden transform scale-95 transition-transform duration-200" id="rowMetaCard">
            <!-- Modal Header -->
            <div class="bg-gradient-to-r from-indigo-950 to-slate-900 text-white px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-folder-plus text-lg text-emerald-400"></i>
                    <div>
                        <h3 class="text-xs sm:text-sm font-bold" id="modalTitle">행 추가 / 정보 관리</h3>
                        <p class="text-[10px] text-slate-300">왼쪽의 고정 칼럼 정보를 설정합니다.</p>
                    </div>
                </div>
                <button onclick="closeMetaModal()" class="text-white/80 hover:text-white hover:bg-white/10 w-8 h-8 rounded-full flex items-center justify-center transition">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <!-- Modal Form body -->
            <form id="rowMetaForm" onsubmit="handleMetaFormSubmit(event)" class="p-6 space-y-4">
                <input type="hidden" id="editRowId">
                
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">구분</label>
                    <input type="text" id="metaCategory" required placeholder="예: 매출, 갱신율, 렌트카" class="w-full p-2.5 border border-slate-200 rounded-xl text-xs bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">센터명</label>
                    <input type="text" id="metaCenter" required placeholder="예: 청주센터, 대전센터, 대구센터" class="w-full p-2.5 border border-slate-200 rounded-xl text-xs bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">영업책임자</label>
                    <input type="text" id="metaManager" required placeholder="영업책임자 실명 입력" class="w-full p-2.5 border border-slate-200 rounded-xl text-xs bg-slate-50 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>

                <!-- Form Controls -->
                <div class="flex items-center justify-end space-x-2 pt-3 border-t border-slate-100">
                    <button type="button" onclick="closeMetaModal()" class="px-4 py-2 border border-slate-200 text-slate-500 hover:bg-slate-50 rounded-xl text-xs font-semibold transition">
                        취소하기
                    </button>
                    <button type="submit" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs font-bold transition shadow-sm">
                        저장 완료
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Alert/Notification Custom Toast Container (No Alerts Allowed!) -->
    <div id="toastContainer" class="fixed bottom-5 right-5 space-y-2 z-50"></div>

    <script>
        // Global State variables
        let activeScreen = 'revenue'; // Options: 'revenue', 'efficiency1', 'efficiency2'
        let activeYear = 2026;
        let searchQuery = '';

        // Complete Default Datasets mapping the insurance sales business
        const defaultDatasets = {
            revenue: [
                { id: 'rev-1', year: 2026, category: '매출 (억 원)', center: '청주센터', manager: '김영호 센터장', m1: 12.5, m2: 14.2, m3: 13.0, m4: 15.1, m5: 16.5, m6: 18.2, m7: 17.0, m8: 15.5, m9: 16.2, m10: 18.0, m11: 19.5, m12: 21.0, yearCum: 196.7, yearAvg: 16.4 },
                { id: 'rev-2', year: 2026, category: '매출 (억 원)', center: '대전센터', manager: '박선영 센터장', m1: 15.0, m2: 15.5, m3: 14.8, m4: 16.2, m5: 17.0, m6: 19.5, m7: 18.5, m8: 17.2, m9: 18.0, m10: 20.2, m11: 21.0, m12: 23.5, yearCum: 216.4, yearAvg: 18.0 },
                { id: 'rev-3', year: 2026, category: '매출 (억 원)', center: '대구센터', manager: '최동현 센터장', m1: 10.2, m2: 11.0, m3: 10.5, m4: 12.0, m5: 13.5, m6: 14.2, m7: 13.8, m8: 12.5, m9: 13.0, m10: 14.5, m11: 15.2, m12: 16.8, yearCum: 157.2, yearAvg: 13.1 },
                { id: 'rev-4', year: 2026, category: '인원현황 (명)', center: '청주센터', manager: '김영호 센터장', m1: 22.0, m2: 22.0, m3: 23.0, m4: 23.0, m5: 24.0, m6: 24.0, m7: 25.0, m8: 25.0, m9: 25.0, m10: 26.0, m11: 26.0, m12: 27.0, yearCum: 292.0, yearAvg: 24.3 }
            ],
            efficiency1: [
                { id: 'eff1-1', year: 2026, category: '갱신율 (%)', center: '청주센터', manager: '김영호 센터장', m1: 85.5, m2: 86.2, m3: 84.8, m4: 87.0, m5: 88.5, m6: 89.2, m7: 88.0, m8: 86.5, m9: 87.2, m10: 89.0, m11: 90.5, m12: 91.2, yearCum: 1043.6, yearAvg: 87.8 },
                { id: 'eff1-2', year: 2026, category: '불량율 (%)', center: '청주센터', manager: '김영호 센터장', m1: 1.2, m2: 1.1, m3: 1.5, m4: 1.0, m5: 0.9, m6: 0.8, m7: 1.1, m8: 1.3, m9: 1.2, m10: 0.9, m11: 0.7, m12: 0.6, yearCum: 12.1, yearAvg: 1.0 },
                { id: 'eff1-3', year: 2026, category: '갱신율 (%)', center: '대전센터', manager: '박선영 센터장', m1: 88.0, m2: 88.5, m3: 87.2, m4: 89.0, m5: 90.2, m6: 91.5, m7: 90.8, m8: 89.5, m9: 90.0, m10: 91.8, m11: 92.5, m12: 93.0, yearCum: 1082.0, yearAvg: 90.2 },
                { id: 'eff1-4', year: 2026, category: '불량율 (%)', center: '대전센터', manager: '박선영 센터장', m1: 0.8, m2: 0.9, m3: 1.0, m4: 0.7, m5: 0.6, m6: 0.5, m7: 0.8, m8: 0.9, m9: 0.8, m10: 0.6, m11: 0.5, m12: 0.4, yearCum: 8.5, yearAvg: 0.7 }
            ],
            efficiency2: [
                { id: 'eff2-1', year: 2026, category: '렌트카 비율 (%)', center: '청주센터', manager: '김영호 센터장', m1: 15.5, m2: 16.0, m3: 15.8, m4: 16.5, m5: 17.2, m6: 18.0, m7: 17.5, m8: 16.8, m9: 17.0, m10: 18.2, m11: 19.0, m12: 19.5, yearCum: 207.0, yearAvg: 17.3 },
                { id: 'eff2-2', year: 2026, category: '기타 효율 (%)', center: '대전센터', manager: '박선영 센터장', m1: 72.0, m2: 73.5, m3: 71.8, m4: 74.2, m5: 75.0, m6: 77.5, m7: 76.8, m8: 75.2, m9: 76.0, m10: 78.5, m11: 79.2, m12: 80.0, yearCum: 909.7, yearAvg: 75.8 }
            ]
        };

        // Complete data set loaded from storage or configured default
        let appData = {};

        // Load or initialize datasets safely with fallback
        function initializeData() {
            const stored = localStorage.getItem('KPI_Dashboard_AppData');
            if (stored) {
                try {
                    appData = JSON.parse(stored);
                    
                    // Fallback to ensure all required screen keys exist
                    if (!appData.revenue) appData.revenue = defaultDatasets.revenue;
                    if (!appData.efficiency1) appData.efficiency1 = defaultDatasets.efficiency1;
                    if (!appData.efficiency2) appData.efficiency2 = defaultDatasets.efficiency2;
                } catch (e) {
                    appData = JSON.parse(JSON.stringify(defaultDatasets));
                }
            } else {
                appData = JSON.parse(JSON.stringify(defaultDatasets));
                saveAllData();
            }
        }

        // Commit active dataset to LocalStorage
        function saveAllData() {
            localStorage.setItem('KPI_Dashboard_AppData', JSON.stringify(appData));
        }

        // Get working dataset for currently selected tab
        function getWorkingDataset() {
            return appData[activeScreen] || [];
        }

        // Overwrite dataset for currently selected tab and commit
        function setWorkingDataset(newDataset) {
            appData[activeScreen] = newDataset;
            saveAllData();
        }

        // Change screen view controller
        function switchScreen(screenId) {
            activeScreen = screenId;

            // Reset navigation tab button classes
            const btnRevenue = document.getElementById('btnScreenRevenue');
            const btnEff1 = document.getElementById('btnScreenEff1');
            const btnScreenEff2 = document.getElementById('btnScreenEff2');

            // Apply style dynamically
            btnRevenue.className = "px-5 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 flex items-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200 whitespace-nowrap";
            btnEff1.className = "px-5 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 flex items-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200 whitespace-nowrap";
            btnScreenEff2.className = "px-5 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 flex items-center gap-2 bg-slate-100 text-slate-600 hover:bg-slate-200 whitespace-nowrap";

            const titleEl = document.getElementById('spreadsheetTitle');

            if (screenId === 'revenue') {
                btnRevenue.className = "px-5 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 flex items-center gap-2 bg-indigo-600 text-white shadow-md shadow-indigo-100 whitespace-nowrap";
                titleEl.innerHTML = "매출/인원현황 분석판";
            } else if (screenId === 'efficiency1') {
                btnEff1.className = "px-5 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 flex items-center gap-2 bg-indigo-600 text-white shadow-md shadow-indigo-100 whitespace-nowrap";
                titleEl.innerHTML = "갱신율/불량율 분석판";
            } else if (screenId === 'efficiency2') {
                btnScreenEff2.className = "px-5 py-2.5 rounded-xl text-xs font-bold transition-all duration-150 flex items-center gap-2 bg-indigo-600 text-white shadow-md shadow-indigo-100 whitespace-nowrap";
                titleEl.innerHTML = "기타효율등 분석판";
            }

            // Trigger complete table render
            updateAppScreen();
        }

        // Adjust selected year dynamically
        function adjustYear(amount) {
            activeYear += amount;
            document.getElementById('displayYear').innerText = `${activeYear}년`;
            updateAppScreen();
            showToast(`${activeYear}년 지표 목록으로 이동했습니다.`, "blue");
        }

        // Return title string for file export purposes
        function getScreenTitleName() {
            if (activeScreen === 'revenue') return "매출_인원현황_분석판";
            if (activeScreen === 'efficiency1') return "갱신율_불량율_분석판";
            return "기타효율등_분석판";
        }

        // Update view with search query and active year filter
        function updateAppScreen() {
            const query = searchQuery.trim().toLowerCase();
            const dataset = getWorkingDataset();

            // Filter by selected year and search text
            const filtered = dataset.filter(row => {
                const yearMatch = (row.year === activeYear);
                const searchMatch = !query || 
                                    row.center.toLowerCase().includes(query) || 
                                    row.manager.toLowerCase().includes(query) ||
                                    row.category.toLowerCase().includes(query);
                return yearMatch && searchMatch;
            });

            renderSpreadsheetRows(filtered);
        }

        // Search bar input listener
        function filterGridData() {
            searchQuery = document.getElementById('gridSearch').value;
            updateAppScreen();
        }

        // Render rows dynamically with interactive input boxes (Monthly + Cumulative + Average manual inputs)
        function renderSpreadsheetRows(data) {
            const tbody = document.getElementById('spreadsheetBody');
            const noData = document.getElementById('gridNoData');

            tbody.innerHTML = '';
            
            if (data.length === 0) {
                noData.classList.remove('hidden');
                return;
            }
            noData.classList.add('hidden');

            data.forEach(row => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/50 transition-colors duration-100";
                
                // Formulate static left side (first column is sticky left-0) & dynamic monthly input boxes
                let rowHtml = `
                    <td class="py-1 px-2 font-bold text-slate-800 border-r border-slate-200 bg-white whitespace-nowrap text-[11px] sticky left-0 z-10 shadow-[1px_0_0_0_rgba(226,232,240,1)]">${row.category}</td>
                    <td class="py-1 px-2 font-semibold text-slate-600 border-r border-slate-200 bg-white whitespace-nowrap text-[11px]">${row.center}</td>
                    <td class="py-1 px-2 text-slate-900 font-medium border-r border-slate-200 bg-white whitespace-nowrap text-[11px]">${row.manager}</td>
                `;

                // Add 12 inputs representing January to December, formatted strictly to .1 decimal place with right alignment
                for (let i = 1; i <= 12; i++) {
                    const cellVal = parseFloat(row[`m${i}`] || 0).toFixed(1);
                    rowHtml += `
                        <td class="p-0.5 border-r border-slate-200 text-center w-[54px]">
                            <input 
                                type="number" 
                                step="0.1" 
                                value="${cellVal}" 
                                onchange="handleInlineCellEdit('${row.id}', 'm${i}', this.value)" 
                                onblur="formatElementToDecimal(this)"
                                class="cell-input w-full bg-slate-50 hover:bg-slate-100 focus:bg-white text-right pr-2 rounded border-0 text-[11px] font-bold text-slate-800 min-h-[28px] px-0.5"
                            >
                        </td>
                    `;
                }

                // Add editable 년누적 & 년평균 manual inputs (right aligned)
                const cumVal = parseFloat(row.yearCum || 0).toFixed(1);
                const avgVal = parseFloat(row.yearAvg || 0).toFixed(1);

                rowHtml += `
                    <!-- Editable Year Cumulative -->
                    <td class="p-0.5 border-r border-slate-200 text-center bg-indigo-50/20 w-[65px]">
                        <input 
                            type="number" 
                            step="0.1" 
                            value="${cumVal}" 
                            onchange="handleInlineCellEdit('${row.id}', 'yearCum', this.value)" 
                            onblur="formatElementToDecimal(this)"
                            class="cell-input w-full bg-indigo-50/50 hover:bg-indigo-100/50 focus:bg-white text-right pr-2 rounded border-0 text-[11px] font-black text-indigo-900 min-h-[28px] px-0.5"
                        >
                    </td>
                    <!-- Editable Year Average -->
                    <td class="p-0.5 border-r border-slate-200 text-center bg-indigo-50/20 w-[65px]">
                        <input 
                            type="number" 
                            step="0.1" 
                            value="${avgVal}" 
                            onchange="handleInlineCellEdit('${row.id}', 'yearAvg', this.value)" 
                            onblur="formatElementToDecimal(this)"
                            class="cell-input w-full bg-indigo-50/50 hover:bg-indigo-100/50 focus:bg-white text-right pr-2 rounded border-0 text-[11px] font-black text-indigo-900 min-h-[28px] px-0.5"
                        >
                    </td>
                    <!-- Row Action controls -->
                    <td class="py-1 px-1 text-center w-[110px] whitespace-nowrap">
                        <div class="flex items-center justify-center space-x-1 whitespace-nowrap">
                            <button onclick="editRowMetadata('${row.id}')" class="text-indigo-600 hover:text-indigo-800 font-semibold text-[10px] transition flex items-center gap-0.5 min-h-[24px] px-1 whitespace-nowrap">
                                <i class="fa-solid fa-pen text-[8px]"></i>수정
                            </button>
                            <span class="text-slate-200 text-[10px]">|</span>
                            <button onclick="deleteGridRow('${row.id}')" class="text-rose-500 hover:text-rose-700 font-semibold text-[10px] transition flex items-center gap-0.5 min-h-[24px] px-1 whitespace-nowrap">
                                <i class="fa-solid fa-trash text-[8px]"></i>삭제
                            </button>
                        </div>
                    </td>
                `;

                tr.innerHTML = rowHtml;
                tbody.appendChild(tr);
            });
        }

        // Helper to format inputs to exactly one decimal place on blur
        function formatElementToDecimal(element) {
            let val = parseFloat(element.value);
            if (isNaN(val)) val = 0.0;
            element.value = val.toFixed(1);
        }

        // Dynamic inline editing listener for monthly and cumulative input cells
        function handleInlineCellEdit(id, fieldKey, newValue) {
            let numValue = parseFloat(newValue);
            if (isNaN(numValue) || numValue < 0) {
                numValue = 0.0;
            }

            // Find matching item in dataset and update value
            const dataset = getWorkingDataset();
            const targetIndex = dataset.findIndex(d => d.id === id);
            
            if (targetIndex !== -1) {
                dataset[targetIndex][fieldKey] = parseFloat(numValue.toFixed(1));
                
                // Commit to storage & announce safety save
                saveAllData();
                showToast("수정 사항이 브라우저에 실시간으로 안전하게 자동 저장되었습니다.", "emerald");
            }
        }

        // Row Meta Modal management (To Add / Edit category, center, manager info)
        function openAddRowModal() {
            const modal = document.getElementById('rowMetaModal');
            const card = document.getElementById('rowMetaCard');
            const form = document.getElementById('rowMetaForm');
            
            form.reset();
            document.getElementById('editRowId').value = '';
            document.getElementById('modalTitle').innerText = "새로운 영업 데이터 행 추가";

            modal.classList.remove('hidden');
            setTimeout(() => {
                card.classList.remove('scale-95');
                card.classList.add('scale-100');
            }, 50);
        }

        function editRowMetadata(id) {
            const modal = document.getElementById('rowMetaModal');
            const card = document.getElementById('rowMetaCard');
            
            document.getElementById('modalTitle').innerText = "영업 조직 정보 수정";
            
            const record = getWorkingDataset().find(r => r.id === id);
            if (record) {
                document.getElementById('editRowId').value = record.id;
                document.getElementById('metaCategory').value = record.category;
                document.getElementById('metaCenter').value = record.center;
                document.getElementById('metaManager').value = record.manager;
            }

            modal.classList.remove('hidden');
            setTimeout(() => {
                card.classList.remove('scale-95');
                card.classList.add('scale-100');
            }, 50);
        }

        function closeMetaModal() {
            const modal = document.getElementById('rowMetaModal');
            const card = document.getElementById('rowMetaCard');
            
            card.classList.remove('scale-100');
            card.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 150);
        }

        // Form submission for metadata with robust state tracking
        function handleMetaFormSubmit(event) {
            event.preventDefault();

            const editId = document.getElementById('editRowId').value;
            const category = document.getElementById('metaCategory').value.trim();
            const center = document.getElementById('metaCenter').value.trim();
            const manager = document.getElementById('metaManager').value.trim();

            const dataset = getWorkingDataset();

            if (editId) {
                // Editing Metadata for existing Row
                const index = dataset.findIndex(r => r.id === editId);
                if (index !== -1) {
                    dataset[index].category = category;
                    dataset[index].center = center;
                    dataset[index].manager = manager;
                    
                    saveAllData(); // Commit Changes
                    showToast("조직 메타 정보가 수정되어 로컬에 자동 보관되었습니다.", "emerald");
                }
            } else {
                // Check duplicate within the same year
                const dup = dataset.find(r => r.center === center && r.manager === manager && r.category === category && r.year === activeYear);
                if (dup) {
                    showToast(`⚠️ 이미 ${activeYear}년에 동일 지표 항목 데이터 행이 존재합니다.`, "amber");
                    return;
                }

                // Creating dynamic new row seeded with 0 values
                const newRow = {
                    id: `${activeScreen}-${Date.now()}`,
                    category: category,
                    center: center,
                    manager: manager,
                    year: activeYear,
                    m1: 0.0, m2: 0.0, m3: 0.0, m4: 0.0, m5: 0.0, m6: 0.0, m7: 0.0, m8: 0.0, m9: 0.0, m10: 0.0, m11: 0.0, m12: 0.0,
                    yearCum: 0.0,
                    yearAvg: 0.0
                };
                
                dataset.push(newRow);
                saveAllData(); // Save to LocalStorage
                showToast("새로운 시계열 관리 행이 성공적으로 등록 및 자동 저장되었습니다.", "emerald");
            }

            updateAppScreen();
            closeMetaModal();
        }

        // Delete Row confirmation (No standard alert confirm used!)
        function deleteGridRow(id) {
            const record = getWorkingDataset().find(r => r.id === id);
            if (!record) return;

            // Build dynamic elegant confirm popup in Toast style
            const confirmBox = document.createElement('div');
            confirmBox.className = "bg-slate-900 text-white p-4 rounded-2xl shadow-2xl border border-slate-700 flex flex-col gap-2 max-w-sm transition-all duration-200 transform translate-y-2";
            confirmBox.innerHTML = `
                <p class="text-xs font-bold flex items-center gap-1.5"><i class="fa-solid fa-triangle-exclamation text-yellow-400"></i> 줄을 삭제하시겠습니까?</p>
                <p class="text-[10px] text-slate-400">${record.center} - ${record.manager} 소장의 해당 정보 및 모든 데이터가 영구적으로 지워집니다.</p>
                <div class="flex items-center justify-end gap-1.5 mt-2">
                    <button id="cancelDelBtn" class="px-2.5 py-1 text-[10px] bg-slate-800 hover:bg-slate-700 rounded-md font-semibold">취소</button>
                    <button id="confirmDelBtn" class="px-2.5 py-1 text-[10px] bg-rose-600 hover:bg-rose-700 rounded-md font-bold">확인</button>
                </div>
            `;
            document.getElementById('toastContainer').appendChild(confirmBox);

            confirmBox.querySelector('#cancelDelBtn').onclick = () => confirmBox.remove();
            confirmBox.querySelector('#confirmDelBtn').onclick = () => {
                const updatedDataset = getWorkingDataset().filter(r => r.id !== id);
                setWorkingDataset(updatedDataset); // Commit & Save automatically
                confirmBox.remove();
                showToast("선택된 영업 조직의 데이터가 제거되고 안전하게 동기화되었습니다.", "rose");
                updateAppScreen();
            };
        }

        // Download current view to standard excel compatible csv format
        function exportCurrentScreenToCSV() {
            const data = getWorkingDataset().filter(d => d.year === activeYear);
            if (data.length === 0) {
                showToast("⚠️ 다운로드할 지표 데이터가 존재하지 않습니다.", "amber");
                return;
            }

            let csvContent = "\uFEFF"; // UTF-8 BOM representation for MS Excel compatibility
            csvContent += `구분,영업센터명,담당자 실명,1월,2월,3월,4월,5월,6월,7월,8월,9월,10월,11월,12월,년 누적,년 평균\n`;

            data.forEach(row => {
                csvContent += `"${row.category}","${row.center}","${row.manager}",${row.m1},${row.m2},${row.m3},${row.m4},${row.m5},${row.m6},${row.m7},${row.m8},${row.m9},${row.m10},${row.m11},${row.m12},${row.yearCum},${row.yearAvg}\n`;
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            
            link.setAttribute("href", url);
            link.setAttribute("download", `${activeYear}년_${getScreenTitleName()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showToast("📁 표준 CSV 보고서 파일 다운로드를 시작합니다.", "emerald");
        }

        // Custom Toast Notification System
        function showToast(message, theme = "indigo") {
            const container = document.getElementById('toastContainer');
            
            // Clean up old toasts if there are too many (prevents vertical bloat)
            if (container.children.length > 4) {
                container.children[0].remove();
            }

            const toast = document.createElement('div');
            
            let themeClass = "bg-slate-900 text-white";
            if (theme === "emerald") themeClass = "bg-emerald-600 text-white";
            if (theme === "rose") themeClass = "bg-rose-600 text-white";
            if (theme === "amber") themeClass = "bg-amber-600 text-white";
            if (theme === "blue") themeClass = "bg-blue-600 text-white";

            toast.className = `${themeClass} p-3.5 rounded-2xl text-xs font-bold shadow-xl flex items-center justify-between gap-3 min-w-[280px] max-w-sm border border-white/10 transform translate-y-2 opacity-0 transition-all duration-200`;
            toast.innerHTML = `
                <div class="flex items-center gap-2">
                    <span><i class="fa-solid fa-cloud-arrow-up"></i></span>
                    <p class="leading-relaxed">${message}</p>
                </div>
                <button class="opacity-70 hover:opacity-100 text-white"><i class="fa-solid fa-xmark"></i></button>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.remove('translate-y-2', 'opacity-0');
            }, 50);

            const dismiss = () => {
                toast.classList.add('translate-y-2', 'opacity-0');
                setTimeout(() => toast.remove(), 250);
            };

            toast.querySelector('button').onclick = dismiss;
            setTimeout(dismiss, 3500);
        }

        // Bootstrapping operations on window onload
        window.onload = function() {
            initializeData();
            // Load and draw initial screens
            switchScreen('revenue');
        }
    </script>
</body>
</html>
